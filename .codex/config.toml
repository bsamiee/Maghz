# Generated by `maghz mcp generate`; edit admin/mcp.py instead.

[mcp_servers.postgres]
command = "forge-maghz-postgres-mcp"
env_vars = ["MAGHZ_MCP__DATABASE_URI"]

[mcp_servers.google-workspace]
command = "forge-workspace-mcp"
args = ["--tool-tier", "extended"]
env_vars = ["GOOGLE_OAUTH_CLIENT_ID", "GOOGLE_OAUTH_CLIENT_SECRET", "WORKSPACE_MCP_CREDENTIALS_DIR"]

[mcp_servers.notebooklm]
command = "notebooklm-mcp"

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp?tools=web_search_exa,web_fetch_exa,web_search_advanced_exa,agent_tools"
env_http_headers = { "x-api-key" = "EXA_API_KEY" }

[mcp_servers.perplexity]
command = "forge-perplexity-mcp"
env_vars = ["PERPLEXITY_API_KEY"]

[mcp_servers.tavily]
command = "forge-tavily-mcp"
env_vars = ["TAVILY_API_KEY"]

[mcp_servers.hostinger]
command = "forge-hostinger-mcp"
env_vars = ["HOSTINGER_API_TOKEN"]

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GH_PROJECTS_TOKEN"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
bearer_token_env_var = "CONTEXT7_API_KEY"

[mcp_servers.greptile]
url = "https://api.greptile.com/mcp"
bearer_token_env_var = "GREPTILE_API_KEY"

[mcp_servers.nuget]
command = "nuget-mcp"

[mcp_servers.jupyter]
command = "forge-jupyter-mcp"

[mcp_servers.doppler-remote]
command = "ssh"
args = ["maghz", "DOPPLER_TOKEN=\"$(doppler configure get token --plain --scope /srv/maghz)\" docker exec -i -e DOPPLER_TOKEN maghz-mcp /opt/mcp/bin/doppler-mcp --read-only --project maghz --config prd_host"]
