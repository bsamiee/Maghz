# Transitional stack declaration for local/prd parity. End-state: the services
# IaC (Pulumi, per the IaC-over-config directive) owns this topology and
# admin/infra.py drives it behind StackOp; this file retires when that lands.
# Profiles: `local` (Mac parity) and `prd` (VPS durable stack) run the SAME
# services on the same loopback ports — the profile switch owns mutual
# exclusion with the maghz-vps-tunnel launchd agent. Secrets arrive only
# through `doppler run`; required interpolation (${KEY:?}) rejects empty env.
name: maghz

x-stack-profiles: &stack_profiles [local, prd]

services:
  db:
    profiles: *stack_profiles
    build:
      context: ./image
      args:
        PARADEDB_TAG: ${MAGHZ_INFRA__PARADEDB_TAG:-0.24.1-pg18}
    image: ${MAGHZ_INFRA__IMAGE_TAG:-maghz-pg:0.1.0}
    restart: unless-stopped
    command:
      [
        'postgres',
        '-c',
        'cron.database_name=postgres',
        '-c',
        'cron.use_background_workers=on',
        '-c',
        'pg_net.database_name=maghz',
        '-c',
        'max_worker_processes=24',
      ]
    environment:
      POSTGRES_USER: maghz
      POSTGRES_DB: maghz
      POSTGRES_PASSWORD: ${MAGHZ_POSTGRES_PASSWORD:?}
    ports:
      - '127.0.0.1:${MAGHZ_INFRA__DB_PORT:?}:5432'
    volumes:
      - maghz-data:/var/lib/postgresql
      - ./db/init/n8n.sql:/docker-entrypoint-initdb.d/10-n8n.sql:ro
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'maghz', '-d', 'maghz', '-q']
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    profiles: *stack_profiles
    image: ${MAGHZ_INFRA__OLLAMA_IMAGE:-ollama/ollama:0.30.10}
    restart: unless-stopped
    ports:
      - '127.0.0.1:${MAGHZ_INFRA__OLLAMA_PORT:?}:11434'
    volumes:
      - ollama-models:/root/.ollama

  n8n:
    profiles: *stack_profiles
    image: ${MAGHZ_N8N__IMAGE:-n8nio/n8n:2.27.3}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: maghz
      DB_POSTGRESDB_PASSWORD: ${MAGHZ_POSTGRES_PASSWORD:?}
      N8N_HOST: ${MAGHZ_N8N__HOST:?}
      N8N_PROTOCOL: ${MAGHZ_N8N__PROTOCOL:?}
      WEBHOOK_URL: ${MAGHZ_N8N__WEBHOOK_URL:?}
    ports:
      - '127.0.0.1:${MAGHZ_N8N__PORT:?}:5678'
    volumes:
      - n8n-data:/home/node/.n8n
      - ./workflows/n8n:/home/node/workflows

volumes:
  maghz-data:
  ollama-models:
  n8n-data:
