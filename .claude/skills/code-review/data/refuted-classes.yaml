# [REFUTED_CLASSES] — the machine-read guard roster review_rail.py compiles into its claim
# classifier, recurrence detector, and generated settled-rulings block. Repo-runtime data:
# the roster starts empty and grows one row per refuted class as `harvest` emits proposal
# rows each round; a landed row is edited here, never in the script.
#
# Row schema (mirrors the RefutedClass struct):
#   class_id:          stable kebab-case id for the refuted claim class
#   matchers:          case-insensitive regex or keyword patterns over normalized claim text
#   refuting_citation: the ruling or evidence that refuted the class (doc path, ledger id)
#   landed_surfaces:   reviewer-config paths that carry the do-not-flag guard
#   rounds_seen:       round numbers where the class recurred
#
# classes:
#   - class_id: example-refuted-class
#     matchers: ["pattern over claim text"]
#     refuting_citation: "docs/laws/example.md"
#     landed_surfaces: [".coderabbit.yaml"]
#     rounds_seen: [1]
classes: []
