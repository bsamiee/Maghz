language: en-US
tone_instructions: "Senior-to-senior register. Dense, declarative, evidence-anchored findings. No praise, no emojis, no hedging. Doctrine violations (CLAUDE.md/AGENTS.md) are defects, not suggestions. Prefer polymorphic collapse over additive patches."
early_access: false
enable_free_tier: true
inheritance: false
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: >-
    Lead with contract-surface and behavior deltas, one dense paragraph. No restated
    diff statistics, no methodology narration.
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: ""
  review_status: true
  review_details: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  labeling_instructions: []
  mutually_exclusive_groups: {}
  auto_apply_labels: true
  suggested_reviewers: true
  auto_assign_reviewers: true
  suggested_reviewers_instructions: []
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: true
  abort_on_close: true
  disable_cache: false
  slop_detection:
    enabled: true
  path_filters:
    - "!uv.lock"
  path_instructions:
    - path: "**"
      instructions: >-
        Universal bar: anticipate 10x functionality growth — surfaces absorb new modalities
        as rows, cases, or dispatch arms, never as new files, flags, or knobs. Defects:
        knob/param/flag spam, hardcoded values, fragile string plumbing, naive happy-path
        logic, hand-rolled reimplementations of capability the ecosystem already provides.
        External packages are first-class implementation material used at full power, newest
        stable versions. Everything is agent-first: composable, receipt-bearing,
        self-describing, no interactive-only paths. Collapse spam relentlessly.
    - path: "{**/*.py,pyproject.toml}"
      instructions: >-
        The Python doctrine lives in docs/stacks/python in this repo — review against it,
        not generic convention. Version floor per pyproject.toml; uv-managed, ruff and ty
        clean. Typed result rails, expression-shaped logic, polymorphic dispatch over
        function spam, no bare exceptions crossing domain boundaries. Secret material never
        lands in code, logs, or committed files — Doppler owns custody. Version movement is
        forward-only — a downgrade or stale pin without a recorded reason is a defect.
    - path: "admin/**"
      instructions: >-
        Ops rails under docs/standards/ops-doctrine.md. CLI handlers are thin lowerers:
        bind request shapes, call owner rails, lower one envelope, map status to exit
        code — domain logic in handlers is a defect. One settings owner feeds adapters;
        direct os.environ reads, duplicate DSNs, and inline credentials are defects. Every
        operation emits a typed receipt carrying route, resource changes, diagnostics,
        counts, and timings; generic envelope abstractions replacing operation-specific
        receipts are defects. Remote work rides one scoped SSH rail with quoted argv and
        rail-lowered faults.
    - path: "compose.yaml"
      instructions: >-
        Transitional topology declaration: the Pulumi stack in admin/infra.py is the
        end-state owner and this file retires when that rail lands — flag drift between
        compose service rows and their admin/infra.py counterparts. Services are
        declarative rows; profiles own local/prd exclusion; secrets arrive only through
        doppler run with required interpolation — an inline credential, token, or resolved
        DSN is a defect.
    - path: "db/**"
      instructions: >-
        SQL is declarative and idempotent: canonical schema files replay to no-op; numbered
        migrations and up/down pairs are defects. Search and ranking logic lives in
        database-owned routines, never application loops. Dictionary staging precedes SQL
        replay; each database object keeps its single owning file per admin/README.md.
    - path: "image/**"
      instructions: >-
        Container image on the declared Postgres base with a generated extension block:
        hand edits drifting from the generator, base changes without a recorded reason, and
        secret material in build args are defects. hadolint-clean.
    - path: "{.mcp.json,.codex/**}"
      instructions: >-
        Generated projections from admin/mcp.py: hand edits are defects — the generator
        changes first, then the projection re-renders. Server entries carry env references
        only, never inline secret values.
    - path: "**/*.sh"
      instructions: >-
        Standalone shell including .claude hooks: set -euo pipefail, shellcheck-clean
        without directives, no `|| true` failure masks, no embedded repo paths, usernames,
        or magic values. Hooks never pass secret values through shell parsing, logs, or
        receipts. Service or container lifecycle mutation in an ad hoc script is a defect —
        the admin/ rails and their typed receipts own VPS mutation.
    - path: ".claude/workflows/**"
      instructions: >-
        Workflow scripts are deterministic orchestration: plain control flow, schema-typed
        agent outputs, bounded loops and harvest rounds, every stage writing its product to
        disk and returning a path receipt. Defects: bare promises without await ownership,
        unbounded polling, branching on wall clock, subagents asked to wait — codex wrappers
        are launch-only and the orchestrator owns time.
    - path: "**/*.md"
      instructions: >-
        Review prose and structure against docs/standards/style-guide.md,
        docs/standards/formatting.md, and docs/standards/information-structure.md — the
        docgen discipline. Defects: no-op sentences that change no reader decision, leading
        filler words, meta-commentary, provenance/freshness tails, checklist tails, heading
        proliferation for short content, tables carrying explanations instead of enumerable
        facts, duplicated content an owning doc already carries, drift from the [UPPER_CASE]
        label convention, quality ladders (good/better/best tiers) where a contract gate
        belongs, restated obligations the instruction chain already carries (follow
        CLAUDE.md, use available tools), and defensive caveats softening settled rules.
    - path: ".claude/skills/**"
      instructions: >-
        Skill bundles under the docgen skill-craft law. Defects: first- or second-person
        voice in frontmatter descriptions — quoted user-utterance trigger phrases are not
        voice; over-broad triggers spanning unrelated domains or keyword-stuffed synonym
        lists; SKILL.md over 500 lines or carrying reference
        banks, troubleshooting ledgers, or example floods that belong one hop down;
        references that only route to other references; no-op intensifiers with no owner,
        action, or gate; filler lead-ins (note that, make sure to, remember to);
        good/better/best quality ladders instead of contract gates; command catalogs
        without task triggers; generic think/plan/implement lifecycle steps; closing
        checklists with no machine-checkable gate; deterministic multi-step procedures
        narrated in prose where a bundled script belongs; three or more abstract guidance
        bullets with no paired rejected/accepted example or gate; one mandated output
        skeleton regardless of consumer; instructed network fetches or global installs
        inside skill bodies, except an owned install surface naming exact source, scope,
        and verification.
  auto_review:
    enabled: true
    description_keyword: ""
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    ignore_title_keywords: []
    labels: []
    drafts: true
    base_branches: []
    ignore_usernames: []
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: false
    simplify:
      enabled: false
    autofix:
      enabled: true
    custom: []
  pre_merge_checks:
