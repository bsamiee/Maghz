          instructions: >-
            Machine owner for local shell, PATH, provisioning, and launcher rails; toolchain or secret-injection failures are fixed there, never patched around in admin/.
        - repository: bsamiee/Rasm
          instructions: >-
            Doctrine master this repo's copied stack law derives from; skill bundles mirror byte-identical across the estate — flag divergence in mirrored surfaces.
